name: Build Boost
on:
  push:
    tags:
      - boost_prebuild*
  workflow_dispatch:

jobs:
  build_windows:
    runs-on: windows-2022
    steps:
      - name: Create Build Environment
        shell: cmd
        run: |
          mkdir ${{runner.workspace}}\boost_prebuild

      - name: Download
        shell: powershell
        run: |
          $Url = "https://archives.boost.io/release/1.90.0/source/boost_1_90_0.zip"
          (New-Object System.Net.WebClient).DownloadFile($Url, "$env:TEMP\boost_1_90_0.zip")
          Expand-Archive -Path "$env:TEMP\boost_1_90_0.zip" -DestinationPath ${{runner.workspace}}/boost

      - name: Bootstrap
        shell: cmd
        run: |
          cd ${{runner.workspace}}\boost\boost_1_90_0
          .\bootstrap.bat

      - name: Build and install
        shell: cmd
        run: |
          cd ${{runner.workspace}}\boost\boost_1_90_0
          .\b2 install --prefix=${{runner.workspace}}\boost_prebuild address-model=64 variant=release threading=multi link=static runtime-link=static,shared --with-headers --with-filesystem --with-program_options --with-thread --with-regex --with-log --with-locale --with-context --with-date_time --with-json --with-container

      - uses: actions/upload-artifact@v6
        with:
          name: boost_prebuild_windows-2022
          path: ${{runner.workspace}}\boost_prebuild
          if-no-files-found: error

  build_ubuntu:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]

    steps:
      - name: Create Build Environment
        shell: bash
        run: |
          mkdir ${{runner.workspace}}/boost_prebuild
          sudo apt-get update

      - name: Download
        shell: bash
        run: |
          wget -q https://archives.boost.io/release/1.90.0/source/boost_1_90_0.tar.gz
          tar -xvf boost_1_90_0.tar.gz > /dev/null
          mv ./boost_1_90_0 ${{runner.workspace}}/boost

      - name: Bootstrap
        shell: bash
        run: |
          cd ${{runner.workspace}}/boost
          ./bootstrap.sh

      - name: Build
        shell: bash
        run: |
          cd ${{runner.workspace}}/boost
          ./b2 --target=static

      - name: Install
        shell: bash
        run: |
          cd ${{runner.workspace}}/boost
          ./b2 install --prefix=${{runner.workspace}}/boost_prebuild

      - uses: actions/upload-artifact@v6
        with:
          name: boost_prebuild_${{matrix.os}}
          path: ${{runner.workspace}}/boost_prebuild
          if-no-files-found: error

  build_osx:
    runs-on: macos-15
    steps:
      - name: Create Build Environment
        shell: bash
        run: |
          mkdir ${{runner.workspace}}/boost_prebuild

      - name: Download
        shell: bash
        run: |
          wget -q https://archives.boost.io/release/1.90.0/source/boost_1_90_0.tar.gz
          tar -xvf boost_1_90_0.tar.gz > /dev/null
          # cp -R ./boost_1_90_0 ${{runner.workspace}}/boost_arm
          mv ./boost_1_90_0 ${{runner.workspace}}/boost

      - name: Bootstrap
        shell: bash
        run: |
          cd ${{runner.workspace}}/boost
          ./bootstrap.sh
          # cd ${{runner.workspace}}/boost_arm
          # ./bootstrap.sh

      - name: Build
        shell: bash
        run: |
          # cd ${{runner.workspace}}/boost_arm
          # ./b2 cxxstd=17 toolset=clang-darwin target-os=darwin architecture=arm abi=aapcs cxxflags="-arch arm64" cflags="-arch arm64" linkflags="-arch arm64" --target=static --without-iostreams
          # mkdir -p arm64 && cp stage/lib/*.a arm64 && cp stage/lib/*.dylib arm64
          cd ${{runner.workspace}}/boost
          ./b2 cxxstd=17
          # mkdir x86_64 && cp stage/lib/*.a x86_64 && cp stage/lib/*.dylib x86_64

      - name: Install
        shell: bash
        run: |
          # cd ${{runner.workspace}}/boost_arm
          # ./b2 install --prefix=${{runner.workspace}}/boost_prebuild_arm cxxstd=17
          cd ${{runner.workspace}}/boost
          ./b2 install --prefix=${{runner.workspace}}/boost_prebuild cxxstd=17
          # mkdir ${{runner.workspace}}/boost_prebuild/include/
          # mkdir ${{runner.workspace}}/boost_prebuild/lib/
          # cp -R ./boost ${{runner.workspace}}/boost_prebuild/include/
          # find ${{runner.workspace}}/boost_prebuild_arm/lib -type f -print0 | while IFS= read -r -d $'\0' file; do lipo -create -output ${{runner.workspace}}/boost_prebuild/lib/$(basename "$file") "$file" ${{runner.workspace}}/boost_prebuild_x86_64/lib/$(basename "$file"); done;

      - name: Pack
        shell: bash
        run: tar -zcvf boost_prebuild.tar.gz ${{runner.workspace}}/boost_prebuild

      - uses: actions/upload-artifact@v6
        with:
          name: boost_prebuild_macos-15
          path: boost_prebuild.tar.gz
          if-no-files-found: error

  build_ios:
    runs-on: macos-15
    strategy:
      matrix:
        include:
          - sdk: iphoneos
            arch: arm64
            artifact: boost_prebuild_ios
            version_flags: -miphoneos-version-min=11.0
          - sdk: iphonesimulator
            arch: x86_64
            artifact: boost_prebuild_ios-simulator
            version_flags: -mios-simulator-version-min=11.0

    steps:
      - name: Create Build Environment
        shell: bash
        run: |
          mkdir ${{runner.workspace}}/boost_prebuild

      - name: Download
        shell: bash
        run: |
          wget -q https://archives.boost.io/release/1.90.0/source/boost_1_90_0.tar.gz
          tar -xvf boost_1_90_0.tar.gz > /dev/null
          mv ./boost_1_90_0 ${{runner.workspace}}/boost

      - name: Bootstrap
        shell: bash
        run: |
          cd ${{runner.workspace}}/boost
          ./bootstrap.sh

      - name: Write user-config.jam
        shell: bash
        run: |
          SDKROOT=$(xcrun --sdk ${{matrix.sdk}} --show-sdk-path)
          cat > ${{runner.workspace}}/boost/user-config.jam <<EOF
          using darwin : ios : clang++ -arch ${{matrix.arch}} -isysroot ${SDKROOT} ${{matrix.version_flags}} ;
          EOF

      - name: Build and install
        shell: bash
        run: |
          cd ${{runner.workspace}}/boost
          ./b2 install --prefix=${{runner.workspace}}/boost_prebuild \
            toolset=darwin-ios target-os=iphone link=static variant=release threading=multi \
            --layout=system cxxstd=17 \
            --with-filesystem --with-program_options --with-thread --with-regex --with-log \
            --with-locale --with-context --with-date_time --with-json --with-container --with-coroutine \
            --user-config=${{runner.workspace}}/boost/user-config.jam \
            -j$(sysctl -n hw.ncpu)

      - uses: actions/upload-artifact@v6
        with:
          name: ${{matrix.artifact}}
          path: ${{runner.workspace}}/boost_prebuild
          if-no-files-found: error

  build_android:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        abi: [x86, x86_64, armeabi-v7a, arm64-v8a]
        include:
          - abi: armeabi-v7a
            ndk_triple: armv7a-linux-androideabi21
          - abi: arm64-v8a
            ndk_triple: aarch64-linux-android21
          - abi: x86
            ndk_triple: i686-linux-android21
          - abi: x86_64
            ndk_triple: x86_64-linux-android21

    steps:
      - name: Create Build Environment
        shell: bash
        run: |
          mkdir -p ${{runner.workspace}}/boost_prebuild/libs/${{matrix.abi}}

      - name: Download
        shell: bash
        run: |
          wget -q https://archives.boost.io/release/1.90.0/source/boost_1_90_0.tar.gz
          tar -xvf boost_1_90_0.tar.gz > /dev/null
          mv ./boost_1_90_0 ${{runner.workspace}}/boost

      - name: Bootstrap
        shell: bash
        run: |
          cd ${{runner.workspace}}/boost
          ./bootstrap.sh

      - name: Write user-config.jam
        shell: bash
        run: |
          NDK=$ANDROID_NDK_LATEST_HOME
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          cat > ${{runner.workspace}}/boost/user-config.jam <<EOF
          using clang : android : $TOOLCHAIN/bin/clang++ --target=${{matrix.ndk_triple}} --sysroot=$TOOLCHAIN/sysroot ;
          EOF

      - name: Build
        shell: bash
        run: |
          cd ${{runner.workspace}}/boost
          ./b2 toolset=clang-android target-os=android link=static variant=release threading=multi --layout=system \
            --with-filesystem --with-program_options --with-thread --with-regex --with-log --with-locale \
            --with-context --with-date_time --with-json --with-container --with-coroutine \
            --user-config=${{runner.workspace}}/boost/user-config.jam \
            cxxflags="-DBOOST_ASIO_DISABLE_STD_ALIGNED_ALLOC" \
            -j$(nproc)

      - name: Collect
        shell: bash
        run: |
          cp ${{runner.workspace}}/boost/stage/lib/*.a ${{runner.workspace}}/boost_prebuild/libs/${{matrix.abi}}/
          cp -R ${{runner.workspace}}/boost/boost ${{runner.workspace}}/boost_prebuild/include

      - uses: actions/upload-artifact@v6
        with:
          name: boost_prebuild_android_${{matrix.abi}}
          path: ${{runner.workspace}}/boost_prebuild
          if-no-files-found: error
